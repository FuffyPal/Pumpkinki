stages:
  - build

variables:
  GO_VERSION: "1.26.4"
  
build_job:
  stage: build
  image: golang:${GO_VERSION}-alpine

  before_script:
    - apk add --no-cache git coreutils

  script:
    #  LINUX for COMPILE
    - GOOS=linux GOARCH=amd64 go build -o build/Pumpkinki_linux ./src

    #  LINUX for COMPILE (ARM)
    - GOOS=linux GOARCH=arm64 go build -o build/Pumpkinki_linux_arm64 ./src

    #  WINDOWS for COMPILE (.exe)
    - GOOS=windows GOARCH=amd64 go build -o build/Pumpkinki_windows.exe ./src

    #  macOS for COMPILE (Intel CPUs)
    - GOOS=darwin GOARCH=amd64 go build -o build/Pumpkinki_mac_intel ./src

    #  macOS for COMPILE (Apple Silicon - M1/M2/M3 CPUs)
    - GOOS=darwin GOARCH=arm64 go build -o build/Pumpkinki_mac_arm64 ./src
  artifacts:
    name: "Pumpkinki-builds-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 days
    paths:
      - target/release/
  rules: 
    - changes: 
        - src/*