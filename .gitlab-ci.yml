stages:
  - build
  - upload

variables:
  REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/Pumpkinki/${CI_COMMIT_TAG}"
  GO_VERSION: "1.26.4"
  
build_job:
  stage: build
  image: golang:${GO_VERSION}-alpine

  before_script:
    - apk add --no-cache git coreutils

  script:
    #  LINUX for COMPILE
    - GOOS=linux GOARCH=amd64 go build -o build/Pumpkinki_linux ./src

    #  LINUX for COMPILE (ARM)
    - GOOS=linux GOARCH=arm64 go build -o build/Pumpkinki_linux_arm64 ./src

    #  WINDOWS for COMPILE (.exe)
    - GOOS=windows GOARCH=amd64 go build -o build/Pumpkinki_windows.exe ./src
  
    # WINDOWS for COMPILE (ARM)
    - GOOS=windows GOARCH=arm64 build -o build/Pumpkinki_windows_arm64.exe ./src

    #  macOS for COMPILE (Intel CPUs)
    - GOOS=darwin GOARCH=amd64 go build -o build/Pumpkinki_mac_intel ./src

    #  macOS for COMPILE (Apple Silicon - M1/M2/M3 CPUs)
    - GOOS=darwin GOARCH=arm64 go build -o build/Pumpkinki_mac_arm64 ./src
  artifacts:
    name: "Pumpkinki-builds-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 days
    paths:
      - target/release/
  rules: 
    - changes: 
        - src/*
      
upload_to_registry:
  stage: upload
  image: curlimages/curl:latest
  script:
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux "${REGISTRY_URL}/pet_linux"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux_arm64 "${REGISTRY_URL}/pet_linux_arm64"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows.exe "${REGISTRY_URL}/pet_windows.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows_arm64.exe "${REGISTRY_URL}/pet_windows_arm64.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_mac_intel "${REGISTRY_URL}/pet_mac_intel"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_mac_arm64 "${REGISTRY_URL}/pet_mac_arm64"'
  rules:
    - if: '$CI_COMMIT_TAG'
      changes:
        - "**/*.go"