stages:
  - test
  - build
  - upload

variables:
  REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/Pumpkinki/${CI_COMMIT_TAG}"
  RUST_VERSION: "1.96.0"

test_job:
  stage: test
  image: rust:${RUST_VERSION}
  before_script:
    - apt-get update && apt-get install -y mingw-w64 gcc-aarch64-linux-gnu git coreutils
  script:
    - cargo test

  rules:
    - changes:
        - "**/*.rs"
build_job:
  stage: build
  image: rust:${RUST_VERSION}

  before_script:
    - apt-get update && apt-get install -y mingw-w64 gcc-aarch64-linux-gnu git coreutils
    - mkdir -p build

  script:
    # LINUX AMD64
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu && cp target/x86_64-unknown-linux-gnu/release/Pumpkinki build/Pumpkinki_linux

    # LINUX ARM64
    - rustup target add aarch64-unknown-linux-gnu
    - CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc cargo build --release --target aarch64-unknown-linux-gnu && cp target/aarch64-unknown-linux-gnu/release/Pumpkinki build/Pumpkinki_linux_arm64

    # WINDOWS AMD64 (.exe)
    - rustup target add x86_64-pc-windows-gnu
    - cargo build --release --target x86_64-pc-windows-gnu && cp target/x86_64-pc-windows-gnu/release/Pumpkinki.exe build/Pumpkinki_windows.exe

  artifacts:
    name: "Pumpkinki-builds-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 days
    paths:
      - build/
  rules:
    - changes:
        - "**/*.rs"

upload_to_registry:
  stage: upload
  image: curlimages/curl:latest
  script:
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux "${REGISTRY_URL}/Pumpkinki_linux"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux_arm64 "${REGISTRY_URL}/Pumpkinki_linux_arm64"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows.exe "${REGISTRY_URL}/Pumpkinki_windows.exe"'
  rules:
    - if: "$CI_COMMIT_TAG"
      changes:
        - "**/*.rs"
