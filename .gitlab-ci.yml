stages:
  - test
  - build
  - upload

variables:
  REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/Pumpkinki/${CI_COMMIT_TAG}"
  RUST_VERSION: "1.96.0"

.test_template:
  stage: test
  rules:
    - changes:
        - "**/*.rs"

# ----------------- LINUX JOBs -----------------
job_linux_amd64:
  extends: .test_template
  tags:
    - saas-linux-medium-amd64
  image: rust:${RUST_VERSION}-alpine
  script:
    - cargo test

job_linux_arm64:
  extends: .test_template
  tags:
    - saas-linux-small-arm64
  image: rust:${RUST_VERSION}-alpine
  script:
    - cargo test

