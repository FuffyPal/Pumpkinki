build_job:
  stage: build
  image: rust:${RUST_VERSION}

  before_script:
    - apt-get update && apt-get install -y mingw-w64 git coreutils
    - mkdir -p build

  script:
    #  LINUX for COMPILE
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu && cp target/x86_64-unknown-linux-gnu/release/Pumpkinki build/Pumpkinki_linux

    - rustup target add aarch64-unknown-linux-gnu
    - cargo build --release --target aarch64-unknown-linux-gnu && cp target/aarch64-unknown-linux-gnu/release/Pumpkinki build/Pumpkinki_linux_arm64

    #  WINDOWS for COMPILE (.exe)
    - rustup target add x86_64-pc-windows-msvc
    - cargo build --release --target x86_64-pc-windows-msvc && cp target/x86_64-pc-windows-msvc/release/Pumpkinki.exe build/Pumpkinki_windows.exe

    - rustup target add aarch64-pc-windows-msvc
    - cargo build --release --target aarch64-pc-windows-msvc && cp target/aarch64-pc-windows-msvc/release/Pumpkinki.exe build/Pumpkinki_windows_arm64.exe

    #  macOS for COMPILE
    - rustup target add x86_64-apple-darwin
    - cargo build --release --target x86_64-apple-darwin && cp target/x86_64-apple-darwin/release/Pumpkinki build/Pumpkinki_mac_intel

    - rustup target add aarch64-apple-darwin
    - cargo build --release --target aarch64-apple-darwin && cp target/aarch64-apple-darwin/release/Pumpkinki build/Pumpkinki_mac_arm64

  artifacts:
    name: "Pumpkinki-builds-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 days
    paths:
      - build/
  rules:
    - changes:
        - "**/*.rs"

upload_to_registry:
  stage: upload
  image: curlimages/curl:latest
  script:
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux "${REGISTRY_URL}/Pumpkinki_linux"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux_arm64 "${REGISTRY_URL}/Pumpkinki_linux_arm64"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows.exe "${REGISTRY_URL}/Pumpkinki_windows.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows_arm64.exe "${REGISTRY_URL}/Pumpkinki_windows_arm64.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_mac_intel "${REGISTRY_URL}/Pumpkinki_mac_intel"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_mac_arm64 "${REGISTRY_URL}/Pumpkinki_mac_arm64"'
  rules:
    - if: "$CI_COMMIT_TAG"
      changes:
        - "**/*.rs"
