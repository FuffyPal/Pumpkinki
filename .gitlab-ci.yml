# ----------------- WINDOWS JOBs -----------------
job_windows_amd64:
  extends: .test_template
  tags:
    - saas-windows-medium-amd64
  before_script:
    - powershell -Command "try { go version } catch { choco install golang --version $env:GO_VERSION -y --no-progress; Refreshenv }"
  script:
    - go test -v ./src/...

        
build_job:
  stage: build
  image: golang:${GO_VERSION}-alpine

  before_script:
    - apk add --no-cache git coreutils

  script:
    #  LINUX for COMPILE
    - GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o build/Pumpkinki_linux ./src
    - GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o build/Pumpkinki_linux_arm64 ./src

    #  WINDOWS for COMPILE (.exe)
    - GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o build/Pumpkinki_windows.exe ./src
    - GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o build/Pumpkinki_windows_arm64.exe ./src

    #  macOS for COMPILE
    - GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o build/Pumpkinki_mac_intel ./src
    - GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o build/Pumpkinki_mac_arm64 ./src
  
  
  artifacts:
    name: "Pumpkinki-builds-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 days
    paths:
      - build/
  rules: 
    - changes: 
        - src/*
      
upload_to_registry:
  stage: upload
  image: curlimages/curl:latest
  script:
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux "${REGISTRY_URL}/Pumpkinki_linux"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_linux_arm64 "${REGISTRY_URL}/Pumpkinki_linux_arm64"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows.exe "${REGISTRY_URL}/Pumpkinki_windows.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_windows_arm64.exe "${REGISTRY_URL}/Pumpkinki_windows_arm64.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_mac_intel "${REGISTRY_URL}/Pumpkinki_mac_intel"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/Pumpkinki_mac_arm64 "${REGISTRY_URL}/Pumpkinki_mac_arm64"'
  rules:
    - if: '$CI_COMMIT_TAG'
      changes:
        - "**/*.go"