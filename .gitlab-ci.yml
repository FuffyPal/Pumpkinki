stages:
  - test
  - build
  - upload

variables:
  REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/Pumpkinki/${CI_COMMIT_TAG}"
  GO_VERSION: "1.26.4"
  
.test_template:
  stage: test
  rules:
    - changes:
        - src/**/*

# ----------------- LINUX JOBs -----------------
job_linux_amd64:
  extends: .test_template
  tags:
    - saas-linux-medium-amd64
  image: golang:${GO_VERSION}-alpine
  script:
    - go test -v ./src/...

job_linux_arm64:
  extends: .test_template
  tags:
    - saas-linux-small-arm64
  image: golang:${GO_VERSION}-alpine
  script:
    - go test -v ./src/...

